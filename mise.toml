[tools]
node = "25.2.1"
"github:lucasew/workspaced" = "latest"

[tasks.lint]
run = "workspaced codebase lint"

[tasks.fmt]
run = "workspaced codebase format"

[tasks.test]
depends = ["test:*"]

[tasks.codegen]
depends = ["codegen:*"]

[tasks."codegen:noop"]
run = "true"

[tasks.install]
depends = ["install:*"]

[tasks."install:npm"]
run = "npm ci && npx playwright install --with-deps"

[tasks.ci]
depends = ["lint", "test"]
