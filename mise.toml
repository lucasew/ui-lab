[tools]
node = "25.2.1"

[tasks.lint]
run = "npm run lint"

[tasks.fmt]
run = "npm run lint"

[tasks.test]
depends = ["test:*"]

[tasks."test:vitest"]
run = "npx vitest run"

[tasks.codegen]
depends = ["codegen:*"]

[tasks.install]
depends = ["install:*"]

[tasks."install:npm"]
run = "npm ci && npx playwright install"

[tasks.ci]
depends = ["lint", "test"]
